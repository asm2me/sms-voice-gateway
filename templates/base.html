<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SMS Voice Gateway{% endblock %}</title>
  <link rel="stylesheet" href="/static/admin.css" />
</head>
<body>
  <div id="ws-status-bar" class="ws-status-bar ws-status-bar-unknown" role="status" aria-live="polite">
    <span class="ws-status-icon" aria-hidden="true">○</span>
    <span class="ws-status-text">Connecting…</span>
  </div>
  <div class="shell">
    <header class="topbar">
      <div>
        <a class="brand" href="/admin">SMS Voice Gateway</a>
        <p class="topbar-subtitle">FastAPI admin portal</p>
      </div>
    </header>

    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
