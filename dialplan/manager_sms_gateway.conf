; ─────────────────────────────────────────────────────────────────────────────
; Asterisk AMI user for the SMS Voice Gateway
;
; Add to /etc/asterisk/manager.conf  (or #include this file from it):
;
;   #include /etc/asterisk/manager_sms_gateway.conf
;
; Then reload: asterisk -rx "manager reload"
; ─────────────────────────────────────────────────────────────────────────────

[sms_gateway]
secret = your_ami_secret_here
deny = 0.0.0.0/0.0.0.0
; Allow only from localhost (or the gateway container's IP)
permit = 127.0.0.1/255.255.255.0
; permit = 172.16.0.0/255.255.0.0   ; Docker bridge network example

; Minimum required permissions
read  = system,call
write = originate
