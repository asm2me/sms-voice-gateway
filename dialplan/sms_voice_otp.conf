; ─────────────────────────────────────────────────────────────────────────────
; SMS Voice OTP – Asterisk dialplan
;
; Include this file in /etc/asterisk/extensions.conf:
;
;   [globals]
;   ; (optional) add this directory to Asterisk sound search paths:
;   ASTAUDIOPATH=/var/lib/asterisk/sounds/sms_otp
;
;   #include /etc/asterisk/sms_voice_otp.conf
;
; Or copy/paste the context below into your extensions.conf.
;
; How it works:
;   The gateway originates a call via AMI with:
;     Context:  sms-voice-otp
;     Exten:    s
;     Priority: 1
;     Variable: OTP_SOUND=sms_otp/<hash>
;
;   When the remote answers, Asterisk:
;     1. Answers the channel
;     2. Waits 1 second
;     3. Plays the pre-synthesised OTP WAV (already contains N repeats + pauses)
;     4. Plays a generic "goodbye" prompt
;     5. Hangs up
; ─────────────────────────────────────────────────────────────────────────────

[sms-voice-otp]

; ── Main entry point ─────────────────────────────────────────────────────────
exten => s,1,NoOp(SMS OTP call started – sound=${OTP_SOUND})
 same => n,Answer()
 same => n,Wait(1)

 ; Play the synthesised audio (the WAV already contains repeated playback
 ; and silence gaps baked in by the TTS service).
 same => n,Playback(${OTP_SOUND})

 ; Pause before goodbye
 same => n,Wait(0.5)

 ; Optional: play a generic "goodbye" system prompt.
 ; Comment out if you don't want this.
 same => n,Playback(vm-goodbye)

 same => n,Hangup()

; ── Catch-all for unexpected extensions ──────────────────────────────────────
exten => _.,1,NoOp(Unexpected extension ${EXTEN} in sms-voice-otp)
 same => n,Hangup()

exten => i,1,Hangup()
exten => t,1,Hangup()
