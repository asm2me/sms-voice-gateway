services:

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"   # local only – do not expose publicly
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── SMS Voice Gateway ────────────────────────────────────────────────────────
  gateway:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      # Shared audio cache – both gateway and Asterisk must read this directory.
      # Mount the Asterisk sounds dir (or a shared NFS/local path) here.
      - audio_cache:/app/audio_cache
      # If Asterisk is on the same host, mount its sounds dir:
      # - /var/lib/asterisk/sounds/sms_otp:/app/audio_cache:rw
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  redis_data:
  audio_cache:
